<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Arkitect logo">
  <rect width="64" height="64" rx="14" fill="#111521"/>

  <!-- Base platform -->
  <path
    d="M10 46 L32 56 L54 46 L32 36 Z"
