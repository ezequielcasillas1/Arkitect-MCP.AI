appId: com.arkitect.desktop
productName: Arkitect
copyright: Copyright © 2026 Arkitect
asar: true
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!**/*.map"
# The arkitect-mcp stdio server is spawned as a Node subprocess by Cursor.
# Node ESM resolves bare specifiers from the physical file path, walking up
# parent `node_modules` folders. That means every dep the MCP subprocess
# imports (transitively) must physically exist under app.asar.unpacked/,
# alongside @modelcontextprotocol/sdk. If any dep stays inside app.asar,
# Node throws ERR_MODULE_NOT_FOUND. This list unpacks the SDK, its direct
# runtime dependencies (per its package.json), and their transitive deps.
asarUnpack:
  # Arkitect workspace packages (MCP server + shared code)
  - node_modules/@arkitect/**/*
  # MCP SDK and its scope
  - node_modules/@modelcontextprotocol/**/*
  # Schema/validation stack the SDK imports unconditionally
  - node_modules/zod/**/*
  - node_modules/zod-to-json-schema/**/*
  - node_modules/ajv/**/*
  - node_modules/ajv-formats/**/*
  # ajv 8.x transitive deps
  - node_modules/fast-deep-equal/**/*
  - node_modules/fast-uri/**/*
  - node_modules/json-schema-traverse/**/*
  - node_modules/require-from-string/**/*
  # @modelcontextprotocol/sdk direct runtime deps (per SDK package.json)
  - node_modules/@hono/**/*
  - node_modules/hono/**/*
  - node_modules/content-type/**/*
  - node_modules/cors/**/*
  - node_modules/cross-spawn/**/*
  - node_modules/eventsource/**/*
  - node_modules/eventsource-parser/**/*
  - node_modules/express/**/*
  - node_modules/express-rate-limit/**/*
  - node_modules/jose/**/*
  - node_modules/json-schema-typed/**/*
  - node_modules/pkce-challenge/**/*
  - node_modules/raw-body/**/*
  # cross-spawn transitive deps
  - node_modules/isexe/**/*
  - node_modules/path-key/**/*
  - node_modules/shebang-command/**/*
  - node_modules/shebang-regex/**/*
  - node_modules/which/**/*
  # express + body-parser + send transitive deps (loaded by SDK's HTTP transports)
  - node_modules/accepts/**/*
  - node_modules/body-parser/**/*
  - node_modules/bytes/**/*
  - node_modules/content-disposition/**/*
  - node_modules/cookie/**/*
  - node_modules/cookie-signature/**/*
  - node_modules/debug/**/*
  - node_modules/depd/**/*
  - node_modules/ee-first/**/*
  - node_modules/encodeurl/**/*
  - node_modules/escape-html/**/*
  - node_modules/etag/**/*
  - node_modules/finalhandler/**/*
  - node_modules/forwarded/**/*
  - node_modules/fresh/**/*
  - node_modules/http-errors/**/*
  - node_modules/iconv-lite/**/*
  - node_modules/inherits/**/*
  - node_modules/ipaddr.js/**/*
  - node_modules/media-typer/**/*
  - node_modules/merge-descriptors/**/*
  - node_modules/mime-db/**/*
  - node_modules/mime-types/**/*
  - node_modules/ms/**/*
  - node_modules/negotiator/**/*
  - node_modules/object-inspect/**/*
  - node_modules/on-finished/**/*
  - node_modules/once/**/*
  - node_modules/parseurl/**/*
  - node_modules/path-to-regexp/**/*
  - node_modules/proxy-addr/**/*
  - node_modules/qs/**/*
  - node_modules/range-parser/**/*
  - node_modules/router/**/*
  - node_modules/safe-buffer/**/*
  - node_modules/safer-buffer/**/*
  - node_modules/send/**/*
  - node_modules/serve-static/**/*
  - node_modules/setprototypeof/**/*
  - node_modules/statuses/**/*
  - node_modules/toidentifier/**/*
  - node_modules/type-is/**/*
  - node_modules/unpipe/**/*
  - node_modules/vary/**/*
  - node_modules/wrappy/**/*
  # get-intrinsic / has-* helpers pulled in by qs, side-channel, etc.
  - node_modules/call-bind-apply-helpers/**/*
  - node_modules/call-bound/**/*
  - node_modules/dunder-proto/**/*
  - node_modules/es-define-property/**/*
  - node_modules/es-errors/**/*
  - node_modules/es-object-atoms/**/*
  - node_modules/function-bind/**/*
  - node_modules/get-intrinsic/**/*
  - node_modules/get-proto/**/*
  - node_modules/gopd/**/*
  - node_modules/has-symbols/**/*
  - node_modules/hasown/**/*
  - node_modules/math-intrinsics/**/*
  - node_modules/side-channel/**/*
  - node_modules/side-channel-list/**/*
  - node_modules/side-channel-map/**/*
  - node_modules/side-channel-weakmap/**/*
win:
  target:
    - nsis
  artifactName: Arkitect-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Arkitect
